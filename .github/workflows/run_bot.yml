name: ETIAS Bot - Daily Post

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -c "from scheduler import run_daily_job; run_daily_job()"

      - name: Save state
        run: |
          git config user.email "bot@etiaseuropa.eu"
          git config user.name "ETIAS Bot"
          git add posted_articles.json
          git diff --staged --quiet || git commit -m "bot: update posted articles [skip ci]"
          git push
